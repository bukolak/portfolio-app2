name: Build And push to ECR

on:
  push:
    branches: [ 'main' ]

permissions:
  id-token: write        # REQUIRED for OIDC
  contents: read         # REQUIRED for checkout

jobs:
  build_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Authenticate to AWS using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::855335083395:role/github-action-role
          aws-region: us-east-1

      - name: Trivy Scan (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Build docker image
        run: docker build -t 855335083395.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 855335083395.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS \
              --password-stdin 855335083395.dkr.ecr.us-east-1.amazonaws.com

      - name: Push image to ECR
        run: docker push 855335083395.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
