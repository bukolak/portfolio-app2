name: Build And push to ECR
on:
  push:
    branches: [ 'main']
jobs:
    build_scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              with:
                scan-type: 'fs'
                severity: CRITICAL,HIGH
                exit-code: '0'
            - name: Build docker image
              run: docker build -t 855335083395.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .
            - name: Scan image with Trivy 
              uses: aquasecurity/trivy-action@v0.36.0 
              with: 
                image-ref: 855335083395.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
                format: table 
                exit-code: 1 
                ignore-unfixed: true 
                severity: CRITICAL,HIGH
            - name: Push image to ECR
              run: echo "Pushing image to ECR"
